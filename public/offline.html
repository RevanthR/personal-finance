<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artha</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 2rem 2.5rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.125rem; font-weight: 700; color: #111827; margin-bottom: .5rem; }
    p  { font-size: .875rem; color: #6b7280; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: #111827; color: #fff;
      border: none; border-radius: 8px;
      padding: .625rem 1.25rem;
      font-size: .875rem; font-weight: 600;
      cursor: pointer; width: 100%;
    }
    button:active { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You are offline</h1>
    <p>Artha needs a connection for your latest data. Connect to Wi-Fi or mobile data and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
